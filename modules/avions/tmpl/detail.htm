<form name="form_detail" method="post" action="/avions/detail" enctype="multipart/form-data">
<div class="row">
	<div class="col grid-margin stretch-card">
		<div class="card">	
			<div class="card-header">Avion</div>	
			<div class="card-body">	

				<INPUT type="hidden" name="id" value="{form_id}">
				<INPUT type="hidden" name="checktime" value="{form_checktime}">
				<p><label>Immatriculation</label>{form_callsign}</p>
				<p><label>Type</label>{form_type}</p>
				<p><label>Train</label>{form_train}</p>
				<p><label>Commentaire</label>{form_comment}</p>
			</div>
					
			<div class="card-footer">	
				<input type="submit" name="fonc" value="Enregistrer" class="btn btn-primary">
				<input type="submit" name="fonc" value="Annuler" class="btn btn-light">
			</div>

		</div>
	</div>
</div>
</form>
